<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f4ef" />
    <title>Fig Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f4ef;
        color: #1c2430;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(360px, calc(100vw - 32px));
        border: 1px solid #dedbd2;
        border-radius: 8px;
        background: #fffdfa;
        padding: 22px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: #6d7480;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fig is offline</h1>
      <p>Reconnect to sync your calendar for two and continue editing.</p>
    </main>
  </body>
</html>
